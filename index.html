<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>URead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0D1B2A;
  --navy2:#122035;
  --navy3:#1A2E45;
  --navy4:#243854;
  --teal:#2ABFBF;
  --teal2:#1FA0A0;
  --teal3:#157878;
  --teal-glow:rgba(42,191,191,.18);
  --paper:#EEF4F7;
  --paper2:#C8D8E4;
  --muted:#6A8BA4;
  --faint:#1E3248;
  --rule:#1E3248;
  --rule2:#263D56;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono',monospace;
  --nav:56px;--bar:68px;
}
html{background:var(--navy);color:var(--paper);font-family:var(--sans);font-size:15px;-webkit-font-smoothing:antialiased}
body{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

/* ── SCREENS ── */
.screen{display:none;padding-bottom:calc(var(--bar)+16px);min-height:100vh}
.screen.active{display:block}

/* ── TOP BAR ── */
.topbar{
  position:sticky;top:0;z-index:90;
  height:var(--nav);
  background:var(--navy);
  border-bottom:1px solid var(--rule);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
}
.logo{
  font-family:var(--serif);font-weight:900;font-size:22px;
  letter-spacing:.06em;color:var(--paper);display:flex;align-items:center;gap:0;
}
.logo-u{color:var(--teal)}
.logo-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--teal);margin:0 1px 8px;display:inline-block;
}
.avatar-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--teal);border:none;cursor:pointer;
  font-family:var(--serif);font-size:14px;font-weight:700;
  color:var(--navy);display:flex;align-items:center;justify-content:center;
}

/* ── BOTTOM NAV ── */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:var(--bar);
  background:var(--navy);border-top:1px solid var(--rule);
  display:flex;align-items:center;z-index:90;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:5px;border:none;background:none;
  color:var(--muted);font-family:var(--mono);font-size:9px;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  padding:8px 0;transition:color .15s;
}
.nav-btn.active{color:var(--teal)}
.nav-btn svg{width:22px;height:22px}
.nav-center{flex:0 0 72px;display:flex;justify-content:center;align-items:center;}
.add-fab{
  width:50px;height:50px;border-radius:50%;
  background:var(--teal);border:none;cursor:pointer;
  font-size:26px;color:var(--navy);font-weight:300;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px var(--teal-glow);
  transition:transform .15s;margin-bottom:8px;
}
.add-fab:active{transform:scale(.93)}

/* ── DISCOVER ── */
.discover-hero{
  padding:28px 20px 22px;
  border-bottom:1px solid var(--rule);
  background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 100%);
}
.discover-eyebrow{
  font-family:var(--mono);font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--teal);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.eyebrow-line{flex:1;height:1px;background:var(--teal3);opacity:.4}
.discover-title{
  font-family:var(--serif);font-size:32px;line-height:1.1;color:var(--paper);
}
.discover-title em{font-style:italic;color:var(--paper2)}

.members-row{
  padding:16px 0 16px 20px;
  border-bottom:1px solid var(--rule);
  display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;
}
.members-row::-webkit-scrollbar{display:none}
.member{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.member-ring{
  width:48px;height:48px;border-radius:50%;
  border:1.5px solid var(--rule2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:17px;color:var(--paper);
  background:var(--navy3);position:relative;transition:border-color .15s;
}
.member-ring.me{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow)}
.member-dot{
  position:absolute;bottom:1px;right:1px;
  width:9px;height:9px;border-radius:50%;
  background:var(--teal);border:2px solid var(--navy);
}
.member-name{font-size:10px;color:var(--muted);max-width:52px;text-align:center}

.books-list{padding:0}
.book-item{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--rule);
  cursor:pointer;transition:background .12s;
}
.book-item:active{background:var(--navy3)}
.book-accent{width:3px;flex-shrink:0}
.book-body{flex:1;padding:14px 12px 14px 14px}
.book-genre{
  font-family:var(--mono);font-size:9px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--muted);margin-bottom:5px;
}
.book-title{
  font-family:var(--serif);font-weight:700;font-size:17px;
  line-height:1.2;color:var(--paper);margin-bottom:3px;
}
.book-author{font-size:12px;color:var(--teal);margin-bottom:10px}
.book-rec{display:flex;align-items:center;gap:7px}
.rec-chip{
  width:20px;height:20px;border-radius:50%;
  background:var(--faint);display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:9px;color:var(--muted);flex-shrink:0;
}
.rec-label{font-size:11px;color:var(--muted)}
.rec-label b{color:var(--paper2);font-weight:500}
.book-side{
  padding:14px 16px 14px 0;
  display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;
}
.book-num{
  font-family:var(--serif);font-style:italic;font-size:30px;
  color:var(--faint);line-height:1;
}
.stars{display:flex;gap:2px}
.star{font-size:10px;color:var(--teal)}
.star.off{color:var(--faint)}

/* ── TOP 10 ── */
.top10-head{
  padding:24px 20px 20px;
  border-bottom:1px solid var(--rule);
  background:linear-gradient(160deg,var(--navy2) 0%,var(--navy) 100%);
}
.top10-eyebrow{
  font-family:var(--mono);font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--teal);margin-bottom:10px;
}
.top10-name{
  font-family:var(--serif);font-weight:900;font-size:36px;
  line-height:.95;color:var(--paper);margin-bottom:16px;
}
.top10-tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{
  padding:5px 10px;border:1px solid var(--rule2);
  font-size:11px;color:var(--muted);background:var(--navy3);cursor:pointer;
}
.tag.add-tag{color:var(--teal);border-color:var(--teal3);border-style:dashed}

.ranked-list{padding:0}
.ranked-row{
  display:flex;align-items:center;
  border-bottom:1px solid var(--rule);
  padding:0 20px;cursor:pointer;transition:background .12s;
  min-height:72px;
}
.ranked-row:active{background:var(--navy3)}
.ranked-n{
  font-family:var(--serif);font-style:italic;font-size:42px;
  line-height:1;width:52px;flex-shrink:0;color:var(--faint);
}
.ranked-n.hot{color:var(--teal)}
.ranked-info{flex:1;padding:14px 0}
.ranked-t{
  font-family:var(--serif);font-weight:700;font-size:15px;
  line-height:1.2;color:var(--paper);margin-bottom:3px;
}
.ranked-a{font-size:11px;color:var(--teal)}
.ranked-g{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em;margin-top:3px}
.ranked-arr{color:var(--muted);font-size:16px;margin-left:12px}
.ranked-empty{opacity:.35;cursor:default}
.ranked-empty .ranked-t{color:var(--muted);font-style:italic;font-weight:400}

/* ── PROFILE ── */
.profile-cover{
  height:110px;
  background:linear-gradient(135deg,var(--navy3) 0%,var(--navy4) 50%,var(--teal3) 100%);
  border-bottom:1px solid var(--rule);
  display:flex;align-items:flex-end;padding:0 20px 16px;
}
.profile-av{
  width:68px;height:68px;border-radius:50%;
  border:3px solid var(--navy);background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:28px;font-weight:700;color:var(--navy);
}
.profile-body{padding:14px 20px 0}
.profile-n{font-family:var(--serif);font-weight:700;font-size:26px;color:var(--paper);line-height:1}
.profile-h{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;margin-bottom:16px}
.ulis-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border:1px solid var(--teal3);
  font-family:var(--mono);font-size:9px;letter-spacing:.12em;
  color:var(--teal);text-transform:uppercase;margin-bottom:16px;
}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}

.stats-row{
  display:flex;border:1px solid var(--rule);margin:0 20px 20px;
}
.stat{
  flex:1;padding:12px 0;text-align:center;
  border-right:1px solid var(--rule);
}
.stat:last-child{border-right:none}
.stat-n{
  font-family:var(--serif);font-size:24px;font-weight:700;
  color:var(--teal);display:block;line-height:1;margin-bottom:4px;
}
.stat-l{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}

.section-label{
  padding:16px 20px 10px;
  font-family:var(--mono);font-size:9px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--rule);
}
.authors-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1px;background:var(--rule);border-top:1px solid var(--rule);
}
.author-cell{background:var(--navy);padding:14px 20px}
.author-n{font-family:var(--serif);font-size:14px;font-weight:700;color:var(--paper)}
.author-g{font-size:11px;color:var(--muted);margin-top:2px}

.invite-row{
  margin:20px;border:1px solid var(--rule);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
}
.invite-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;color:var(--teal);text-transform:uppercase;margin-bottom:3px}
.invite-sub{font-size:12px;color:var(--muted)}
.copy-btn{
  padding:8px 14px;border:1px solid var(--teal);
  font-family:var(--mono);font-size:10px;color:var(--teal);
  background:none;cursor:pointer;letter-spacing:.1em;
  transition:background .15s,color .15s;
}
.copy-btn:active{background:var(--teal);color:var(--navy)}

/* ── MODAL ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(5,12,20,.88);z-index:200;
  align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.modal{
  width:100%;max-width:430px;background:var(--navy2);
  border-top:2px solid var(--teal3);
  padding:24px 20px 44px;
  animation:up .22s ease;
  position:relative;
}
@keyframes up{from{transform:translateY(32px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-title{
  font-family:var(--serif);font-style:italic;font-size:24px;
  color:var(--paper);margin-bottom:20px;
}
.modal-close{
  position:absolute;top:16px;right:20px;
  background:none;border:none;color:var(--muted);
  font-size:20px;cursor:pointer;line-height:1;
}
.field{
  width:100%;background:var(--navy3);
  border:1px solid var(--rule2);border-radius:0;
  color:var(--paper);font-family:var(--sans);font-size:14px;
  padding:12px 14px;margin-bottom:10px;outline:none;
  transition:border-color .15s;appearance:none;
}
.field:focus{border-color:var(--teal)}
.field::placeholder{color:var(--muted)}
select.field{cursor:pointer}
.submit-btn{
  width:100%;padding:15px;background:var(--teal);
  border:none;color:var(--navy);font-family:var(--mono);
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;
  cursor:pointer;margin-top:4px;font-weight:500;
  transition:background .15s;
}
.submit-btn:active{background:var(--teal2)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--bar)+16px);left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--teal);color:var(--navy);
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;font-weight:500;
  padding:10px 20px;opacity:0;transition:opacity .2s,transform .2s;
  pointer-events:none;z-index:300;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DETAIL ── */
.detail{
  display:none;position:fixed;inset:0;
  background:var(--navy);z-index:150;overflow-y:auto;
  padding-bottom:40px;
}
.detail.open{display:block}
.detail-back{
  position:sticky;top:0;background:var(--navy);
  border-bottom:1px solid var(--rule);
  padding:0 20px;height:var(--nav);
  display:flex;align-items:center;gap:12px;cursor:pointer;
}
.back-arrow{color:var(--teal);font-size:20px}
.back-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.detail-band{height:4px}
.detail-content{padding:24px 20px}
.detail-genre{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
.detail-title{font-family:var(--serif);font-weight:900;font-size:30px;line-height:1.1;color:var(--paper);margin-bottom:6px}
.detail-author{font-size:14px;color:var(--paper2);margin-bottom:20px}
.detail-stars{display:flex;gap:4px;margin-bottom:20px}
.detail-star{font-size:16px;color:var(--teal)}
.detail-star.off{color:var(--faint)}
.detail-divider{height:1px;background:var(--rule);margin:20px 0}
.detail-rec-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.detail-note{font-size:14px;color:var(--paper2);line-height:1.6;font-style:italic}
.detail-who{display:flex;align-items:center;gap:10px;margin-top:16px}
.detail-chip{width:28px;height:28px;border-radius:50%;background:var(--faint);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:12px;color:var(--muted)}
.detail-by{font-size:12px;color:var(--muted)}
.detail-by b{color:var(--paper);font-weight:500}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo"><span class="logo-u">U</span>Read</div>
  <button class="avatar-btn" onclick="goTo('profile')">D</button>
</div>

<!-- ══ DISCOVER ══ -->
<div id="screen-discover" class="screen active">
  <div class="discover-hero">
    <div class="discover-eyebrow">
      ULIS Book Club
      <div class="eyebrow-line"></div>
      Private
    </div>
    <div class="discover-title">What they're<br><em>reading</em></div>
  </div>
  <div class="members-row" id="membersRow"></div>
  <div class="books-list" id="booksList"></div>
</div>

<!-- ══ TOP 10 ══ -->
<div id="screen-top10" class="screen">
  <div class="top10-head">
    <div class="top10-eyebrow">Your list · 2024</div>
    <div class="top10-name">My<br>Top 10</div>
    <div class="top10-tags" id="authorTags"></div>
  </div>
  <div class="ranked-list" id="rankedList"></div>
</div>

<!-- ══ PROFILE ══ -->
<div id="screen-profile" class="screen">
  <div class="profile-cover">
    <div class="profile-av" id="profileAv">D</div>
  </div>
  <div class="profile-body">
    <div class="profile-n" id="profileName">Diana J.</div>
    <div class="profile-h" id="profileHandle">@diana · member since Jan 2024</div>
    <div class="ulis-badge"><div class="badge-dot"></div>ULIS Parent · UPG</div>
  </div>
  <div class="stats-row">
    <div class="stat"><span class="stat-n" id="statBooks">0</span><span class="stat-l">Books</span></div>
    <div class="stat"><span class="stat-n" id="statMembers">1</span><span class="stat-l">Members</span></div>
    <div class="stat"><span class="stat-n" id="statTop">0</span><span class="stat-l">In Top 10</span></div>
  </div>
  <div class="section-label">Favourite authors</div>
  <div class="authors-grid" id="authorsGrid"></div>
  <div class="invite-row">
    <div>
      <div class="invite-label">Invite a member</div>
      <div class="invite-sub">Share the private link</div>
    </div>
    <button class="copy-btn" onclick="copyInvite()">Copy link</button>
  </div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<div class="bottomnav">
  <button class="nav-btn active" id="btn-discover" onclick="goTo('discover')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 12L12 3L21 12V20C21 20.55 20.55 21 20 21H15V16H9V21H4C3.45 21 3 20.55 3 20V12Z"/></svg>
    Discover
  </button>
  <button class="nav-btn" id="btn-top10" onclick="goTo('top10')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 6H20M4 10H20M4 14H14M4 18H10"/></svg>
    My Top 10
  </button>
  <div class="nav-center">
    <button class="add-fab" onclick="openModal()">+</button>
  </div>
  <button class="nav-btn" id="btn-search" onclick="goTo('discover')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21L16.65 16.65"/></svg>
    Search
  </button>
  <button class="nav-btn" id="btn-profile" onclick="goTo('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20C4 17 7.58 14 12 14C16.42 14 20 17 20 20"/></svg>
    Profile
  </button>
</div>

<!-- ══ ADD MODAL ══ -->
<div class="overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">Add a book</div>
    <input class="field" id="f-title" placeholder="Title" />
    <input class="field" id="f-author" placeholder="Author" />
    <select class="field" id="f-genre">
      <option value="" disabled selected>Genre</option>
      <option>Magical Realism</option>
      <option>Literary Fiction</option>
      <option>Contemporary Fiction</option>
      <option>Historical Fiction</option>
      <option>Mystery</option>
      <option>Essay / Non-fiction</option>
      <option>Thriller</option>
      <option>Poetry</option>
      <option>Other</option>
    </select>
    <select class="field" id="f-rating">
      <option value="" disabled selected>Rating</option>
      <option value="5">★★★★★ — Essential</option>
      <option value="4">★★★★☆ — Really good</option>
      <option value="3">★★★☆☆ — Good</option>
      <option value="2">★★☆☆☆ — Meh</option>
      <option value="1">★☆☆☆☆ — Skip it</option>
    </select>
    <input class="field" id="f-note" placeholder="Why do you recommend it?" />
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:12px">
      <input type="checkbox" id="f-top10" style="accent-color:var(--teal);width:16px;height:16px"> Add to My Top 10
    </label>
    <button class="submit-btn" onclick="addBook()">Add to the club →</button>
  </div>
</div>

<!-- ══ DETAIL ══ -->
<div class="detail" id="detail">
  <div class="detail-back" onclick="closeDetail()">
    <span class="back-arrow">‹</span>
    <span class="back-label">Back</span>
  </div>
  <div class="detail-band" id="detail-band"></div>
  <div class="detail-content">
    <div class="detail-genre" id="d-genre"></div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-author" id="d-author"></div>
    <div class="detail-stars" id="d-stars"></div>
    <div class="detail-divider"></div>
    <div class="detail-rec-label">Why they recommend it</div>
    <div class="detail-note" id="d-note"></div>
    <div class="detail-who">
      <div class="detail-chip" id="d-chip"></div>
      <div class="detail-by">Recommended by <b id="d-by"></b></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ACCENTS=['#2ABFBF','#1A8FAF','#2A9FBF','#1AAFAF','#3ABFAF','#1A7FAF'];

const defaultMembers=[
  {id:'m1',name:'Diana J.',handle:'@diana',initials:'D',active:true,me:true,
   authors:['Isabel Allende','Haruki Murakami','Elena Ferrante','Toni Morrison']},
];
const defaultBooks=[
  {id:'b1',title:'The House of the Spirits',author:'Isabel Allende',genre:'Magical Realism',rating:5,note:'A book that changes your perspective on the world.',by:'Diana J.',handle:'@diana',inTop:true,color:'#2ABFBF'},
  {id:'b2',title:'Norwegian Wood',author:'Haruki Murakami',genre:'Contemporary Fiction',rating:5,note:'Melancholy and beauty on every page.',by:'Diana J.',handle:'@diana',inTop:true,color:'#1A8FAF'},
  {id:'b3',title:'My Brilliant Friend',author:'Elena Ferrante',genre:'Literary Fiction',rating:5,note:'The most honest portrayal of female friendship I have read.',by:'Diana J.',handle:'@diana',inTop:true,color:'#2A9FBF'},
  {id:'b4',title:'Like Water for Chocolate',author:'Laura Esquivel',genre:'Magical Realism',rating:5,note:'Mexico in every recipe, magic in every chapter.',by:'Diana J.',handle:'@diana',inTop:true,color:'#1AAFAF'},
  {id:'b5',title:'Beloved',author:'Toni Morrison',genre:'Historical Fiction',rating:5,note:'Devastating and necessary.',by:'Diana J.',handle:'@diana',inTop:true,color:'#3ABFAF'},
  {id:'b6',title:'The Name of the Rose',author:'Umberto Eco',genre:'Historical Mystery',rating:4,note:'A fascinating intellectual labyrinth.',by:'Diana J.',handle:'@diana',inTop:true,color:'#1A7FAF'},
];

function loadData(){
  try{
    const b=localStorage.getItem('uread_books');
    const m=localStorage.getItem('uread_members');
    return{books:b?JSON.parse(b):defaultBooks,members:m?JSON.parse(m):defaultMembers};
  }catch(e){return{books:defaultBooks,members:defaultMembers}}
}
function saveData(books,members){
  try{localStorage.setItem('uread_books',JSON.stringify(books));localStorage.setItem('uread_members',JSON.stringify(members));}catch(e){}
}

let {books,members}=loadData();

function goTo(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+screen).classList.add('active');
  const btn=document.getElementById('btn-'+screen);
  if(btn) btn.classList.add('active');
  if(screen==='discover') renderDiscover();
  if(screen==='top10') renderTop10();
  if(screen==='profile') renderProfile();
  window.scrollTo(0,0);
}

function renderDiscover(){
  const row=document.getElementById('membersRow');
  row.innerHTML=members.map(m=>`
    <div class="member">
      <div class="member-ring ${m.me?'me':''}">
        ${m.initials}${m.active?'<div class="member-dot"></div>':''}
      </div>
      <div class="member-name">${m.name.split(' ')[0]}</div>
    </div>`).join('');
  const list=document.getElementById('booksList');
  list.innerHTML=books.map((b,i)=>`
    <div class="book-item" onclick="openDetail('${b.id}')">
      <div class="book-accent" style="background:${b.color}"></div>
      <div class="book-body">
        <div class="book-genre">${b.genre}</div>
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-rec">
          <div class="rec-chip">${b.by[0]}</div>
          <div class="rec-label">Added by <b>${b.by}</b></div>
        </div>
      </div>
      <div class="book-side">
        <div class="book-num">${i+1}</div>
        <div class="stars">${[1,2,3,4,5].map(s=>`<span class="star${s>b.rating?' off':''}">★</span>`).join('')}</div>
      </div>
    </div>`).join('');
}

function renderTop10(){
  const topBooks=books.filter(b=>b.inTop);
  const me=members.find(m=>m.me)||members[0];
  document.getElementById('authorTags').innerHTML=
    me.authors.map(a=>`<span class="tag">${a}</span>`).join('')+
    `<span class="tag add-tag" onclick="editAuthors()">+ edit</span>`;
  let html='';
  for(let i=1;i<=10;i++){
    const b=topBooks[i-1];
    if(b){
      html+=`<div class="ranked-row" onclick="openDetail('${b.id}')">
        <div class="ranked-n ${i<=3?'hot':''}">${i}</div>
        <div class="ranked-info">
          <div class="ranked-t">${b.title}</div>
          <div class="ranked-a">${b.author}</div>
          <div class="ranked-g">${b.genre}</div>
        </div>
        <div class="ranked-arr">›</div>
      </div>`;
    } else {
      html+=`<div class="ranked-row ranked-empty" onclick="openModal()">
        <div class="ranked-n">${i}</div>
        <div class="ranked-info"><div class="ranked-t">Add a book...</div></div>
        <div class="ranked-arr" style="color:var(--teal)">+</div>
      </div>`;
    }
  }
  document.getElementById('rankedList').innerHTML=html;
}

function renderProfile(){
  const me=members.find(m=>m.me)||members[0];
  document.getElementById('profileAv').textContent=me.initials;
  document.getElementById('profileName').textContent=me.name;
  document.getElementById('profileHandle').textContent=me.handle+' · member since Jan 2024';
  document.getElementById('statBooks').textContent=books.filter(b=>b.by===me.name).length;
  document.getElementById('statMembers').textContent=members.length;
  document.getElementById('statTop').textContent=books.filter(b=>b.inTop).length;
  const genres=['Magical Realism','Contemporary','Literary Fiction','American Narrative'];
  document.getElementById('authorsGrid').innerHTML=me.authors.map((a,i)=>`
    <div class="author-cell">
      <div class="author-n">${a}</div>
      <div class="author-g">${genres[i]||'Fiction'}</div>
    </div>`).join('');
}

function openDetail(id){
  const b=books.find(x=>x.id===id);
  if(!b) return;
  document.getElementById('d-genre').textContent=b.genre;
  document.getElementById('d-title').textContent=b.title;
  document.getElementById('d-author').textContent=b.author;
  document.getElementById('d-stars').innerHTML=[1,2,3,4,5].map(s=>
    `<span class="detail-star${s>b.rating?' off':''}">★</span>`).join('');
  document.getElementById('d-note').textContent=b.note||'No note added.';
  document.getElementById('d-chip').textContent=b.by[0];
  document.getElementById('d-by').textContent=b.by;
  document.getElementById('detail-band').style.background=b.color;
  document.getElementById('detail').classList.add('open');
}
function closeDetail(){document.getElementById('detail').classList.remove('open')}

function openModal(){
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),100);
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  ['f-title','f-author','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-genre').selectedIndex=0;
  document.getElementById('f-rating').selectedIndex=0;
  document.getElementById('f-top10').checked=false;
}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});

function addBook(){
  const title=document.getElementById('f-title').value.trim();
  const author=document.getElementById('f-author').value.trim();
  if(!title||!author){showToast('Add a title and author');return;}
  const genre=document.getElementById('f-genre').value||'Fiction';
  const rating=parseInt(document.getElementById('f-rating').value)||5;
  const note=document.getElementById('f-note').value.trim();
  const inTop=document.getElementById('f-top10').checked;
  const me=members.find(m=>m.me)||members[0];
  books.unshift({id:'b'+Date.now(),title,author,genre,rating,note,by:me.name,handle:me.handle,inTop,color:ACCENTS[books.length%ACCENTS.length]});
  saveData(books,members);
  closeModal();
  renderDiscover();
  showToast('Book added ✓');
}

function copyInvite(){
  navigator.clipboard.writeText(window.location.href).then(()=>showToast('Link copied ✓')).catch(()=>showToast('Copy the URL manually'));
}

function editAuthors(){
  const me=members.find(m=>m.me)||members[0];
  const input=prompt('Favourite authors (separated by commas):',me.authors.join(', '));
  if(input!==null){
    me.authors=input.split(',').map(a=>a.trim()).filter(Boolean);
    saveData(books,members);renderTop10();renderProfile();
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

renderDiscover();
</script>
</body>
</html>
